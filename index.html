<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pro</title>

<style>
:root {
  --bg:#0b0e11;
  --card:#161a1e;
  --primary:#f0b90b;
  --text:#eaecef;
  --sub:#b7bdc6;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",Arial;
}

body {
  background:var(--bg);
  color:var(--text);
}

/* HERO (ÚNICA TELA VISÍVEL) */
.hero {
  height:100vh;
  background:url('image_3e0b416.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), #0b0e11);
}

.content {
  position:relative;
  text-align:center;
}

.content h1 {
  font-size:48px;
}

.content span {
  color:var(--primary);
}

.content p {
  color:var(--sub);
  margin-top:10px;
}

.content button {
  margin-top:25px;
  padding:14px 30px;
  background:var(--primary);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

/* LOGIN MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.box {
  background:var(--card);
  padding:30px;
  border-radius:12px;
  width:320px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#0b0e11;
  border:1px solid #333;
  color:white;
}

button.login {
  width:100%;
  padding:12px;
  background:var(--primary);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- CAPA -->
<section class="hero">
  <div class="overlay"></div>

  <div class="content">
    <h1>Controle total do seu <span>dinheiro</span></h1>
    <p>Ambiente seguro e privado para sua evolução financeira</p>

    <button onclick="abrirLogin()">Começar agora</button>
  </div>
</section>

<!-- LOGIN -->
<div class="modal" id="modal">
  <div class="box">
    <h2>Acessar conta</h2>

    <input id="email" placeholder="E-mail">
    <input id="senha" type="password" placeholder="Senha">

    <button class="login" onclick="entrar()">Entrar</button>
  </div>
</div>

<script>
// ABRIR LOGIN
function abrirLogin(){
  document.getElementById("modal").style.display="flex";
}

// LOGIN
function entrar(){

  let user = JSON.parse(localStorage.getItem("user"));

  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  if(user && email === user.email && senha === user.password){

    localStorage.setItem("logged","true");

    // 🔥 REDIRECIONA PARA ÁREA SEGURA
    window.location.href="dashboard.html";

  } else {
    alert("Dados incorretos");
  }
}

// 🔐 SE JÁ ESTIVER LOGADO → ENTRA DIRETO
if(localStorage.getItem("logged") === "true"){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
