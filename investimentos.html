<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Investimentos</title>

<style>
body { background:#0b0e11; color:white; font-family:Arial; margin:0; }

nav {

justify-content:space-between;

border-bottom:1px solid #222;
}

.container {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

.card {

padding:20px;

transition:0.3s;
}

.card:hover {

}

h2 { color:#f0b90b; }

<body>

<script>
if(localStorage.getItem("logged")!=="true"){
location.href="index.html";
}
</script>

<nav>
<div>Investimentos</div>
</nav>

<div class="container">

<div class="card" onclick="go('investimento1.html')">
<h2>Renda Fixa</h2>

</div>

<div class="card" onclick="go('investimento2.html')">

</div>

<div class="card" onclick="go('investimento3.html')">
<h2>Fundos Imobiliários</h2>
<p>Renda passiva mensal</p>
</div>

<div class="card" onclick="go('investimento4.html')">
<h2>Criptomoedas</h2>

</div>

<div class="card" onclick="go('investimento5.html')">
