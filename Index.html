<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Finanças Pro</title>

<style>
:root {
  --bg:#0b0e11;
  --primary:#f0b90b;
  --text:#eaecef;
}

body { margin:0; background:var(--bg); color:var(--text); font-family:Arial; }

.hero {
  height:100vh;
  background:url('image_3e0b416.png') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.content {
  position:relative;
  text-align:center;
}

button {
  padding:12px 25px;
  background:var(--primary);
  border:none;
  cursor:pointer;
}

/* LOGIN */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.box {
  background:#161a1e;
  padding:25px;
  border-radius:10px;
  width:300px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<section class="hero">
<div class="overlay"></div>

<div class="content">
<h1>Aprenda a lidar com o seu dinheiro de maneira prática!</h1>
<p>Inicie essa jornada.</p>

<button onclick="abrir()">Começar agora!</button>
</div>
</section>

<div class="modal" id="modal">
<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
</div>
</div>

<script>
function abrir(){
  document.getElementById("modal").style.display="flex";
}

function login(){
  let email = document.getElementById("email").value;
  let senha = document.getElementById("senha").value;

  
  if(email === "admin@email.com" && senha === "1234"){
    localStorage.setItem("logged","true");
    window.location.href="dashboard.html";
  } else {
    alert("Dados incorretos");
  }
}

if(localStorage.getItem("logged") === "true"){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
