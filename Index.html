<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pro</title>

<style>
:root {
  --bg: #0b0e11;
  --card: #161a1e;
  --primary: #f0b90b;
  --text: #eaecef;
  --sub: #b7bdc6;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Arial;
}

body { background: var(--bg); color: var(--text); }

nav {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid #222;
}

.logo { color: var(--primary); font-weight: bold; }

.menu button {
  background: none;
  border: none;
  color: var(--text);
  margin-left: 15px;
  cursor: pointer;
}

.menu button:hover { color: var(--primary); }

.hero {
  padding: 60px 20px;
  text-align: center;
}

.hero span { color: var(--primary); }

.dashboard {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 30px;
  flex-wrap: wrap;
}

.box {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  width: 250px;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

.card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content { padding: 15px; }
.card h2 { color: var(--primary); }

footer {
  text-align: center;
  padding: 20px;
  color: var(--sub);
}
</style>
</head>

<body>

<nav>
  <div class="logo">FinançasPro</div>

  <div class="menu">
    <button onclick="go('index.html')">Home</button>
    <button onclick="go('dicas.html')">Dicas</button>
    <button onclick="go('investimentos.html')">Investimentos</button>
    <button onclick="go('caminhos.html')">Caminhos</button>
    <button onclick="go('login.html')">Login</button>
  </div>
</nav>

<section class="hero">
  <h1>Controle total do seu <span>dinheiro</span></h1>
  <p>Plataforma moderna para evolução financeira</p>
</section>

<section class="dashboard">
  <div class="box"><h3>R$ 0,00</h3><p>Saldo</p></div>
  <div class="box"><h3>R$ 0,00</h3><p>Investimentos</p></div>
  <div class="box"><h3>0%</h3><p>Rentabilidade</p></div>
</section>

<div class="container">
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f">
      <div class="card-content">
        <h2>Controle</h2>
        <p>Gestão completa</p>
      </div>
    </div>
  </div>
</div>

<footer>© 2026 FinançasPro</footer>

<script>
function isLogged(){
  return localStorage.getItem("logged") === "true";
}

function go(page){

  const protectedPages = [
    "dicas.html",
    "investimentos.html",
    "caminhos.html"
  ];

  if(protectedPages.includes(page)){
    if(!isLogged()){
      localStorage.setItem("redirectAfterLogin", page);
      window.location.href = "login.html";
      return;
    }
  }

  window.location.href = page;
}
</script>

</body>
</html>
