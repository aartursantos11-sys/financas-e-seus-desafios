<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanças Pro</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f6f9;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #0a3d62, #1e5f8a);
  color: white;
  padding: 40px 20px;
  text-align: center;
}

header h1 {
  font-size: 32px;
}

header p {
  margin-top: 10px;
  opacity: 0.9;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  background: #fff;
  padding: 15px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

nav button {
  background: none;
  border: none;
  font-weight: bold;
  cursor: pointer;
  padding: 8px 12px;
  transition: 0.3s;
}

nav button:hover {
  color: #1e5f8a;
}

/* HERO IMAGE */
.hero {
  width: 100%;
  height: 250px;
  background: url("https://images.unsplash.com/photo-1565514020179-026b92b2d16b") center/cover;
}

/* CONTAINER */
.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

/* CARDS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

/* CARD IMAGE */
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

/* CARD CONTENT */
.card-content {
  padding: 15px;
}

.card h2 {
  font-size: 18px;
  margin-bottom: 8px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 15px;
  background: #0a3d62;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<header>
  <h1>Finanças Inteligentes</h1>
  <p>Domine seu dinheiro e construa seu futuro</p>
</header>

<nav>
  <button onclick="go('index.html')">Home</button>
  <button onclick="go('dicas.html')">Dicas</button>
  <button onclick="go('investimentos.html')">Investimentos</button>
  <button onclick="go('caminhos.html')">Caminhos</button>
  <button onclick="go('contato.html')">Contato</button>
</nav>

<div class="hero"></div>

<div class="container">

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f">
      <div class="card-content">
        <h2>Controle Financeiro</h2>
        <p>Entenda seus gastos e tome decisões inteligentes.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1579621970563-ebec7560ff3e">
      <div class="card-content">
        <h2>Reserva de Emergência</h2>
        <p>Segurança financeira para momentos inesperados.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3">
      <div class="card-content">
        <h2>Investimentos</h2>
        <p>Faça seu dinheiro trabalhar para você.</p>
      </div>
    </div>

  </div>

</div>

<footer>
  © 2026 Finanças Pro
</footer>

<script>
function go(page){
  window.location.href = page;
}
</script>

</body>
</html>
