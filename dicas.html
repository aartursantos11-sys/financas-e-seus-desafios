<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dicas</title>

<style>
:root {
  --bg:#0b0e11;
  --card:#161a1e;
  --primary:#f0b90b;
  --text:#eaecef;
}

body { background:var(--bg); color:var(--text); margin:0; font-family:Arial; }

nav {
  display:flex; justify-content:space-between;
  padding:20px; border-bottom:1px solid #222;
}

.menu button {
  background:none; border:none; color:var(--text);
  margin-left:15px; cursor:pointer;
}

.menu button:hover { color:var(--primary); }

.container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.tip {
  background:var(--card);
  padding:20px;
  border-radius:10px;
  transition:0.3s;
}

.tip:hover {
  transform:scale(1.03);
}
</style>
</head>

<body>

<nav>
  <div>FinançasPro</div>
  <div class="menu">
    <button onclick="go('index.html')">Home</button>
    <button onclick="go('dicas.html')">Dicas</button>
    <button onclick="go('investimentos.html')">Investimentos</button>
    <button onclick="go('caminhos.html')">Caminhos</button>
    <button onclick="go('contato.html')">Contato</button>
  </div>
</nav>

<div class="container">

<div class="tip" onclick="go('evitar-gastos.html')">Evite dívidas desnecessárias.</div>

<div class="tip" onclick="go('consistencia.html')">Invista com consistência.</div>

<div class="tip" onclick="go('estudo.html')">Estude antes de aplicar dinheiro.</div>

<div class="tip" onclick="go('disciplina.html')">Tenha disciplina financeira.</div>

</div>

<script>
function go(p){ window.location.href = p; }
</script>

</body>
</html>
