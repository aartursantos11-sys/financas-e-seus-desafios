<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FinançasPro</title>

<style>
:root {
  --bg:#0b0e11;
  --card:#161a1e;
  --primary:#f0b90b;
  --text:#eaecef;
  --sub:#b7bdc6;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", Arial;
}

body {
  background:var(--bg);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:var(--card);
  padding:30px;
  border-radius:12px;
  width:350px;
}

h2 {
  text-align:center;
  color:var(--primary);
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:#0b0e11;
  border:1px solid #333;
  border-radius:8px;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:var(--primary);
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.switch {
  text-align:center;
  margin-top:15px;
  color:var(--sub);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<!-- LOGIN -->
<div id="login">
  <input id="loginUser" placeholder="Usuário ou E-mail">
  <input id="loginPass" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<!-- CADASTRO ETAPAS -->
<div id="register" style="display:none;">

  <div id="step1">
    <input id="email" type="email" placeholder="Seu e-mail">
    <button onclick="next(2)">Enviar código</button>
  </div>

  <div id="step2" style="display:none;">
    <input placeholder="Código de verificação (simulado)">
    <button onclick="next(3)">Verificar</button>
  </div>

  <div id="step3" style="display:none;">
    <input id="password" type="password" placeholder="Crie uma senha">
    <button onclick="next(4)">Continuar</button>
  </div>

  <div id="step4" style="display:none;">
    <input id="birth" type="date">
    <button onclick="next(5)">Continuar</button>
  </div>

  <div id="step5" style="display:none;">
    <input id="name" placeholder="Como deseja ser chamado(a)?">
    <button onclick="registerUser()">Finalizar</button>
  </div>

</div>

<div class="switch" onclick="toggle()">
  Não tem conta? Criar
</div>

</div>

<script>
let creating = false;

function toggle(){
  creating = !creating;

  document.getElementById("login").style.display = creating ? "none" : "block";
  document.getElementById("register").style.display = creating ? "block" : "none";

  document.getElementById("title").innerText = creating ? "Criar Conta" : "Login";

  document.querySelector(".switch").innerText =
    creating ? "Já tem conta? Entrar" : "Não tem conta? Criar";
}

function next(step){
  for(let i=1;i<=5;i++){
    let el = document.getElementById("step"+i);
    if(el) el.style.display = "none";
  }
  document.getElementById("step"+step).style.display = "block";
}

function registerUser(){
  let user = {
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    name: document.getElementById("name").value
  };

  localStorage.setItem("user", JSON.stringify(user));

  alert("Conta criada com sucesso!");
  location.reload();
}

function login(){
  let user = JSON.parse(localStorage.getItem("user"));

  let input = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  if(user && (input === user.email) && pass === user.password){
    localStorage.setItem("logged", "true");
    alert("Login realizado!");
    window.location.href = "index.html";
  } else {
    alert("Dados incorretos!");
  }
}
</script>

</body>
</html>
